version: '3.8'

services:
  # ─── PostgreSQL ────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: growprofile
      POSTGRES_USER: growprofile
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-growprofile_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U growprofile']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Next.js App ───────────────────────────
  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://growprofile:${POSTGRES_PASSWORD:-growprofile_dev}@postgres:5432/growprofile
      REDIS_URL: redis://redis:6379
    ports:
      - '127.0.0.1:3000:3000'

  # ─── DM Sender Worker ─────────────────────
  dm-sender:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://growprofile:${POSTGRES_PASSWORD:-growprofile_dev}@postgres:5432/growprofile
      REDIS_URL: redis://redis:6379
    command: ['node', '--import', 'tsx', 'lib/workers/dm-sender.worker.ts']

  # ─── Webhook Processor Worker ──────────────
  webhook-processor:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://growprofile:${POSTGRES_PASSWORD:-growprofile_dev}@postgres:5432/growprofile
      REDIS_URL: redis://redis:6379
    command: ['node', '--import', 'tsx', 'lib/workers/webhook-process.worker.ts']

  # ─── Token Refresh Worker ──────────────────
  token-refresh:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://growprofile:${POSTGRES_PASSWORD:-growprofile_dev}@postgres:5432/growprofile
      REDIS_URL: redis://redis:6379
    command: ['node', '--import', 'tsx', 'lib/workers/token-refresh.worker.ts']

  # ─── Abuse Detector Worker ─────────────────
  abuse-detector:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://growprofile:${POSTGRES_PASSWORD:-growprofile_dev}@postgres:5432/growprofile
      REDIS_URL: redis://redis:6379
    command: ['node', '--import', 'tsx', 'lib/workers/abuse-detector.worker.ts']

  # ─── Comment Poller (cron) ─────────────────
  comment-poller:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://growprofile:${POSTGRES_PASSWORD:-growprofile_dev}@postgres:5432/growprofile
      REDIS_URL: redis://redis:6379
    command: ['sh', '-c', 'while true; do node --import tsx lib/scripts/poll-comments.ts; sleep 120; done']

volumes:
  pgdata:
  redisdata:
