# GrowProfile Backend Services
#
# PostgreSQL and Redis are already running as host services on this VPS.
# This compose file is for the BullMQ worker process only (Phase 4+).
#
# Host services:
#   - PostgreSQL: 127.0.0.1:5432 (user: ntech, db: growprofile)
#   - Redis: 127.0.0.1:6379
#
# To add containerized services in production, uncomment below:

services:
  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile.worker
    container_name: growprofile-worker
    restart: unless-stopped
    env_file:
      - ../.env
    network_mode: host
    depends_on: []
    profiles:
      - worker  # Only starts with: docker compose --profile worker up
